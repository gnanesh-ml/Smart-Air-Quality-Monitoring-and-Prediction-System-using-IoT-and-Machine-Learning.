<!DOCTYPE html>
<html>

<head>

<title>Air Quality Monitoring Login</title>

<link rel="stylesheet" href="/static/style.css">

<style>

body{
font-family:Arial;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login-container{
background:white;
padding:40px;
border-radius:10px;
width:350px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.error{
color:red;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="login-container">

<h2>Air Quality Monitoring System</h2>

<!-- ERROR MESSAGE -->

{% with messages = get_flashed_messages() %}
{% if messages %}
<div class="error">
{{ messages[0] }}
</div>
{% endif %}
{% endwith %}

<form method="POST">

<input type="email" name="email" placeholder="Enter Email" required>

<input type="password" name="password" placeholder="Enter Password" required>

<button type="submit">Login</button>

</form>

<p>New user? <a href="/register">Create Account</a></p>

</div>

</body>

</html>
