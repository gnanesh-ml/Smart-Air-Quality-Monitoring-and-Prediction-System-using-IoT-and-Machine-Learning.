<!DOCTYPE html>
<html>

<head>

<title>Air Quality Dashboard</title>

<link rel="stylesheet" href="/static/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family: Arial;
background:#f5f7fb;
margin:0;
padding:0;
}

.dashboard{
text-align:center;
padding:30px;
}

.cards{
display:flex;
justify-content:center;
gap:30px;
margin-top:30px;
flex-wrap:wrap;
}

.card{
background:white;
padding:25px;
width:200px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card h3{
margin-bottom:10px;
color:#555;
}

.card h1{
margin:0;
font-size:32px;
}

.graph{
width:80%;
margin:auto;
margin-top:40px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="dashboard">

<div class="top-bar">

<h2>Air Quality Monitoring Dashboard</h2>

<a href="/logout">
<button class="logout-btn">Logout</button>
</a>

</div>

<div class="cards">

<div class="card">
<h3>Temperature</h3>
<h1 id="temp">--</h1>
</div>

<div class="card">
<h3>Humidity</h3>
<h1 id="humidity">--</h1>
</div>

<div class="card">
<h3>Gas Level</h3>
<h1 id="gas">--</h1>
</div>

<div class="card">
<h3>Air Quality</h3>
<h1 id="status">--</h1>
</div>

<!-- ✅ ADD HERE -->
<div class="card">
<h3>AQI Prediction (5 min)</h3>
<h1 id="prediction">--</h1>
</div>

</div>

<div class="graph">
<canvas id="chart"></canvas>
</div>

</div>

<script>
const ctx = document.getElementById("chart").getContext("2d");

let chart = new Chart(ctx, {
    type: "bar",
    data: {
        labels: ["Temperature", "Humidity", "Gas"],
        datasets: [{
            label: "Live Sensor Data",
            data: [0, 0, 0],
            backgroundColor: [
                "rgba(255, 99, 132, 0.6)",
                "rgba(54, 162, 235, 0.6)",
                "rgba(255, 206, 86, 0.6)"
            ],
            borderRadius: 10
        }]
    },
    options: {
        responsive: true,
        scales: {
            y: {
                beginAtZero: true
            }
        }
    }
});

// FETCH DATA EVERY 5 SECONDS
async function loadData() {
    const response = await fetch("/api/data");
    const data = await response.json();

    // Update values
    document.getElementById("temp").innerText = data.temp + " °C";
    document.getElementById("humidity").innerText = data.humidity + " %";
    document.getElementById("gas").innerText = data.gas;
    document.getElementById("status").innerText = data.status;
    document.getElementById("prediction").innerText = data.prediction;

    // Update graph
    chart.data.datasets[0].data = [
        data.temp,
        data.humidity,
        data.gas
    ];

    chart.update();
}

// Run every 5 seconds
setInterval(loadData, 5000);

// First load
loadData();
</script>
</body>

</html>
